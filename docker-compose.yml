services:
  backend:
    build:
      context: ./backend
    # Host port is configurable; default avoids macOS's AirPlay Receiver on 5000.
    # The container still listens on 5000 internally (nginx proxies to backend:5000).
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    # Loads environment variables from your backend folder
    # Make sure MONGO_URI and JWT_SECRET are in backend/.env
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
    # Host port is configurable in case 8080 is already in use.
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: always
