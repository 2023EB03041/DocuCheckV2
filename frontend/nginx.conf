server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow larger request bodies for ID document / image uploads.
    client_max_body_size 20M;

    # Docker's embedded DNS server, so the backend hostname is resolved
    # per-request at runtime rather than once at nginx startup (avoids a
    # hard "host not found in upstream" failure on a startup race).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API calls to the backend container (docker-compose service name).
    location /api/ {
        set $backend_upstream backend:5000;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for client-side routes (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
